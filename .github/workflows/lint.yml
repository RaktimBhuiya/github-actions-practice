name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    #This steps will clone the code automatically from current branch to runner
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v7
        #This step will install the linting tool
      - name: Install Linter
        run: pip install ruff
        #This step will run the linter
      - name: Check the file for linting
        run: ruff check .
  
